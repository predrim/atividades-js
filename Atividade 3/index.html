<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
  <h2>Contador de Cliques</h2>
  <button id="increment">+</button>
  <button id="decrement">-</button>
  <span id="counter">0</span>

  <h2>Adicionar Texto</h2>
  <input type="text" id="textInput" placeholder="Digite e pressione Enter">
  <p>Caracteres (sem espaço): <span id="charCount">0</span></p>
  <div id="output"></div>

  <h2>Adicionar Lista</h2>
  <select id="listType">
    <option value="ul">Lista não ordenada</option>
    <option value="ol">Lista ordenada</option>
  </select>
  <button id="addList">Adicionar Lista</button>
  <div id="lists"></div>

  <h2>Reset</h2>
  <button id="reset">Resetar Tudo</button>

  <script src="script.js"></script>
</body>
</html>
